services:
  - type: web
    name: lin-companion
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: BARK_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: PROACTIVE_MIN_MINUTES
        value: "90"
      - key: PROACTIVE_MAX_MINUTES
        value: "240"
      - key: PROACTIVE_CHECK_EVERY_MINUTES
        value: "5"
